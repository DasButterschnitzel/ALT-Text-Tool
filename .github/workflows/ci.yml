name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit-Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ExifTool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest

      - name: Run unit tests
        run: pytest -q

  ollama-smoke:
    name: Ollama Smoke-Test
    runs-on: ubuntu-latest
    needs: unit-tests
    # Smoke-Test mit echtem Vision-Modell ist im CI inhaerent flaky
    # (Modell-Verfuegbarkeit, CPU-Inferenz, Service-Start). Failures
    # sollen den PR nicht blockieren; Unit-Tests sind die Hauptsignale.
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ExifTool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama service
        run: |
          nohup ollama serve > ollama.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:11434/api/tags > /dev/null; then
              echo "Ollama bereit nach $((i*2))s."
              exit 0
            fi
            sleep 2
          done
          echo "Ollama nicht erreichbar nach 120s."
          cat ollama.log || true
          exit 1

      - name: Pull a small vision model for the smoke test
        timeout-minutes: 8
        run: |
          ollama pull moondream:latest 2>&1 | tee pull.log
          ollama list

      - name: Run smoke test
        env:
          ALTTEXT_SMOKE_MODEL: moondream:latest
        run: python -u scripts/smoke_test.py 2>&1 | tee smoke.log

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs
          path: |
            ollama.log
            pull.log
            smoke.log
          if-no-files-found: ignore
